<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title >Temple Album</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles/filter.css">
</head>
<body>
    <div class="header">
        Temple Album
        <button class="hamburger" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>
    </div>
    
    <!-- Filter Buttons -->
    <div class="nav" id="nav-menu">
        <button onclick="filterTemples('home')">All Temples</button>
        <button onclick="filterTemples('old')">Old Temples</button>
        <button onclick="filterTemples('new')">New Temples</button>
        <button onclick="filterTemples('large')">Large Temples</button>
        <button onclick="filterTemples('small')">Small Temples</button>
    </div>

    <!-- Temple Cards Container -->
    <main>
        <div id="temple-container" class="temple-grid"></div>
    </main>
    <script src="scripts/filter.js"></script>
    <footer class="footer">
        &copy; 2025 &#x1F33A; Baluku Josephats &#x1F33A; Uganda <br>
        Last Modification: <span id="last-modified"></span>
    </footer>
</body>
</html>
